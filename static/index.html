	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	    <meta charset="UTF-8">
	    <title>公证处期货交易终端 v1.1</title>
	    <!-- 引入 98.css 框架，直接通过 CDN 加载，无需下载 -->
	    <link rel="stylesheet" href="https://unpkg.com/98.css@0.1.20/dist/98.css">
	    <style>
	        body {
	            background: #008080; /* 经典 Win95 蓝绿桌面背景 */
	            margin: 0;
	            padding: 20px;
	            font-family: "MS Sans Serif", "Microsoft YaHei", sans-serif;
	            overflow: hidden;
	            height: 100vh;
	            box-sizing: border-box;
	        }
	        .window {
	            width: 100%;
	            max-width: 800px;
	            margin: 0 auto;
	            display: flex;
	            flex-direction: column;
	        }
	        .window-body {
	            flex: 1;
	            overflow: hidden;
	            display: flex;
	            flex-direction: column;
	            gap: 10px;
	        }
	        .market-container {
	            display: flex;
	            gap: 10px;
	            height: 350px;
	        }
	        .list-box {
	            width: 100%;
	            height: 100%;
	            overflow-y: auto;
	            background: white;
	            border: 2px inset #ddd;
	            font-size: 12px;
	        }
	        .list-item {
	            padding: 4px 6px;
	            cursor: pointer;
	            border-bottom: 1px dotted #ccc;
	            display: flex;
	            justify-content: space-between;
	        }
	        .list-item:hover {
	            background: #navy;
	            color: white;
	        }
	        .list-item.selected {
	            background: #000080;
	            color: white;
	        }
	        .log-box {
	            height: 120px;
	            overflow-y: auto;
	            background: #000;
	            color: #0f0;
	            font-family: 'Courier New', monospace;
	            font-size: 12px;
	            padding: 5px;
	            border: 2px inset #ddd;
	        }
	        .status-bar {
	            font-size: 12px;
	        }
	        .trade-panel {
	            display: flex;
	            align-items: center;
	            gap: 10px;
	            padding: 10px;
	            background: #c0c0c0;
	            border: 2px groove #ddd;
	        }
	        .trade-panel input {
	            width: 80px;
	        }
	    </style>
	</head>
	<body>
	    <div class="window">
	        <div class="title-bar">
	            <div class="title-bar-text">📉 公证处期货交易终端 - v1.1</div>
	            <div class="title-bar-controls">
	                <button aria-label="Minimize"></button>
	                <button aria-label="Maximize"></button>
	                <button aria-label="Close"></button>
	            </div>
	        </div>
	        <div class="window-body">
	            <!-- 顶部账户状态 -->
	            <div class="status-bar">
	                <p class="status-bar-field">当前玩家: <span id="player-id">加载中...</span></p>
	                <p class="status-bar-field">💰 现金: <strong id="player-cash">0</strong> 钞</p>
	                <p class="status-bar-field"> selectedItem: <span id="selected-item">无</span></p>
	            </div>
	            <!-- 市场列表 -->
	            <div class="market-container">
	                <fieldset style="flex: 1; display: flex; flex-direction: column;">
	                    <legend>矿石市场</legend>
	                    <div id="stones-list" class="list-box"></div>
	                </fieldset>
	                <fieldset style="flex: 1; display: flex; flex-direction: column;">
	                    <legend>兔子市场</legend>
	                    <div id="rabbits-list" class="list-box"></div>
	                </fieldset>
	            </div>
	            <!-- 交易面板 -->
	            <div class="trade-panel">
	                <label>数量:</label>
	                <input type="number" id="trade-qty" value="1" min="1">
	                <button id="btn-buy" style="width: 80px;">买入</button>
	                <button id="btn-sell" style="width: 80px;">卖出</button>
	                <div style="flex: 1;"></div>
	                <label>我的持仓:</label>
	                <span id="player-holding" style="font-weight: bold;">0</span>
	            </div>
	            <!-- 系统日志 -->
	            <fieldset>
	                <legend>系统日志</legend>
	                <div id="log-box" class="log-box">系统启动中...\n</div>
	            </fieldset>
	        </div>
	    </div>
	    <script>
	        // 获取URL中的玩家ID，如果没有则随机生成一个
	        const urlParams = new URLSearchParams(window.location.search);
	        let playerId = urlParams.get('player_id');
	        if (!playerId) {
	            playerId = '玩家_' + Math.floor(Math.random() * 10000);
	            // 实际应用中这里可以跳转到登录页，这里为了测试直接随机
	        }
	        document.getElementById('player-id').innerText = playerId;
	        // WebSocket 连接
	        const ws = new WebSocket(`ws://${window.location.host}/ws/${playerId}`);
	        // 运行时状态
	        let currentMarket = { stones: {}, rabbits: {} };
	        let playerData = { cash: 0, stones: {}, rabbits: {} };
	        let selectedCategory = null;
	        let selectedItem = null;
	        // DOM 元素
	        const logBox = document.getElementById('log-box');
	        function log(msg) {
	            const time = new Date().toLocaleTimeString();
	            logBox.innerHTML += `[${time}] ${msg}<br>`;
	            logBox.scrollTop = logBox.scrollHeight;
	        }
	        // 渲染市场列表
	        function renderMarket() {
	            const stonesList = document.getElementById('stones-list');
	            const rabbitsList = document.getElementById('rabbits-list');
	            stonesList.innerHTML = '';
	            rabbitsList.innerHTML = '';
	            for (const [name, price] of Object.entries(currentMarket.stones)) {
	                const div = document.createElement('div');
	                div.className = 'list-item';
	                if (selectedCategory === 'stones' && selectedItem === name) div.classList.add('selected');
	                div.innerHTML = `<span>${name}</span> <span>${price.toFixed(0)} 钞</span>`;
	                div.onclick = () => selectItem('stones', name);
	                stonesList.appendChild(div);
	            }
	            for (const [name, price] of Object.entries(currentMarket.rabbits)) {
	                const div = document.createElement('div');
	                div.className = 'list-item';
	                if (selectedCategory === 'rabbits' && selectedItem === name) div.classList.add('selected');
	                div.innerHTML = `<span>${name}</span> <span>${price.toFixed(0)} 钞</span>`;
	                div.onclick = () => selectItem('rabbits', name);
	                rabbitsList.appendChild(div);
	            }
	        }
	        // 渲染玩家状态
	        function renderPlayer() {
	            document.getElementById('player-cash').innerText = playerData.cash.toFixed(0);
	            if (selectedItem && selectedCategory) {
	                const holding = playerData[selectedCategory][selectedItem] || 0;
	                document.getElementById('player-holding').innerText = holding;
	            } else {
	                document.getElementById('player-holding').innerText = '0';
	            }
	        }
	        // 选中商品
	        function selectItem(category, item) {
	            selectedCategory = category;
	            selectedItem = item;
	            document.getElementById('selected-item').innerText = `${item} (${category})`;
	            renderMarket();
	            renderPlayer();
	        }
	        // 发送交易请求
	        function trade(is_buy) {
	            if (!selectedItem || !selectedCategory) {
	                alert("请先在市场列表中选择一种商品！");
	                return;
	            }
	            const qty = parseFloat(document.getElementById('trade-qty').value);
	            if (isNaN(qty) || qty <= 0) {
	                alert("请输入有效的数量！");
	                return;
	            }
	            ws.send(JSON.stringify({
	                action: is_buy ? "buy" : "sell",
	                category: selectedCategory,
	                item: selectedItem,
	                qty: qty
	            }));
	        }
	        // 绑定按钮事件
	        document.getElementById('btn-buy').onclick = () => trade(true);
	        document.getElementById('btn-sell').onclick = () => trade(false);
	        // WebSocket 事件处理
	        ws.onopen = () => log("已连接到交易服务器。");
	        ws.onmessage = (event) => {
	            const msg = JSON.parse(event.data);
	            switch(msg.type) {
	                case 'market':
	                    currentMarket = { stones: msg.stones, rabbits: msg.rabbits };
	                    renderMarket();
	                    break;
	                case 'player':
	                    playerData = msg.data;
	                    renderPlayer();
	                    break;
	                case 'trade_ok':
	                    log(`✅ ${msg.msg}`);
	                    break;
	                case 'error':
	                    log(`❌ 错误: ${msg.msg}`);
	                    break;
	                case 'event':
	                    log(`📢 公告: ${msg.msg}`);
	                    break;
	            }
	        };
	        ws.onclose = () => log("⚠️ 与服务器断开连接。");
	        ws.onerror = () => log("⚠️ 连接发生错误。");
	    </script>
	</body>
	</html>
