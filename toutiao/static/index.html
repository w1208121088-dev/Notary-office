<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公证所交易市场</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Tahoma", "MS Sans Serif", "SimSun", sans-serif;
    background: #008080;
    color: #000;
    min-height: 100vh;
    font-size: 13px;
  }

  /* ── 登录界面（伪装成弹出对话框） ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  #login-screen .dialog {
    width: 320px;
    background: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
  }
  #login-screen .dialog-titlebar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: #fff;
    font-weight: bold;
    padding: 4px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  #login-screen .dialog-titlebar .x {
    background: #c0c0c0;
    color: #000;
    width: 18px; height: 16px;
    line-height: 14px;
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    border-top: 1px solid #fff;
    border-left: 1px solid #fff;
    border-right: 1px solid #404040;
    border-bottom: 1px solid #404040;
  }
  #login-screen .dialog-body {
    padding: 20px 24px;
    text-align: center;
  }
  #login-screen .dialog-body .icon { font-size: 2.2rem; margin-bottom: 6px; }
  #login-screen h1 { font-size: 1rem; margin-bottom: 4px; }
  #login-screen p  { color: #222; font-size: 0.78rem; margin-bottom: 14px; }
  #login-screen input {
    padding: 5px 8px;
    font-size: 0.85rem;
    border: none;
    background: #fff;
    color: #000;
    width: 220px;
    text-align: center;
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    font-family: inherit;
    margin-bottom: 14px;
  }
  #login-screen input:focus { outline: 1px dotted #000; }
  #login-screen button {
    padding: 6px 28px;
    background: #c0c0c0;
    color: #000;
    border: none;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
  }
  #login-screen button:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }

  /* ── 主界面：整体伪装成一个窗口 ── */
  #app {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: #c0c0c0;
  }

  /* 窗口标题栏 */
  #titlebar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: #fff;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    font-weight: bold;
    font-size: 13px;
  }
  #titlebar .winbtns { display: flex; gap: 3px; }
  #titlebar .winbtns span {
    background: #c0c0c0;
    color: #000;
    width: 18px; height: 16px;
    line-height: 14px;
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    border-top: 1px solid #fff;
    border-left: 1px solid #fff;
    border-right: 1px solid #404040;
    border-bottom: 1px solid #404040;
  }

  /* 顶栏（菜单条样式） */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: #c0c0c0;
    border-bottom: 1px solid #808080;
    flex-shrink: 0;
    font-size: 12px;
  }
  #topbar .title { font-weight: bold; }
  #topbar .player-info { color: #000; }
  #topbar .cash { color: #006400; font-weight: bold; }

  /* BGM 播放条 */
  #bgm-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    background: #c0c0c0;
    border-bottom: 1px solid #808080;
    flex-shrink: 0;
    font-size: 0.76rem;
  }
  #bgm-bar .bgm-icon { font-size: 0.9rem; }
  #bgm-toggle {
    padding: 2px 10px;
    background: #c0c0c0;
    border: none;
    font-size: 0.74rem;
    cursor: pointer;
    font-family: inherit;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
  }
  #bgm-toggle:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }
  #bgm-track-name { color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #bgm-vol { width: 70px; }

  /* 通知栏（状态栏样式） */
  #notice {
    padding: 3px 12px;
    background: #c0c0c0;
    font-size: 0.78rem;
    color: #000;
    flex-shrink: 0;
    transition: color 0.3s;
    border-top: 1px solid #fff;
    border-bottom: 1px solid #808080;
    min-height: 20px;
  }
  #notice.ok    { color: #006400; font-weight: bold; }
  #notice.err   { color: #aa0000; font-weight: bold; }
  #notice.event { color: #000080; font-weight: bold; }

  /* 标签页（文件夹标签样式） */
  #tabs {
    display: flex;
    background: #c0c0c0;
    flex-shrink: 0;
    padding: 6px 8px 0 8px;
    gap: 2px;
  }
  .tab-btn {
    padding: 6px 16px;
    background: #c0c0c0;
    border: none;
    color: #000;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: inherit;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #404040;
    position: relative;
    top: 2px;
  }
  .tab-btn.active {
    background: #c0c0c0;
    font-weight: bold;
    top: 0;
    border-bottom: 2px solid #c0c0c0;
    z-index: 2;
  }

  /* 内容区 */
  #content {
    flex: 1;
    overflow: hidden;
    background: #c0c0c0;
    padding: 0 8px 8px 8px;
  }
  .tab-panel {
    display: none;
    height: 100%;
    overflow-y: auto;
    padding: 10px;
    background: #fff;
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }
  .tab-panel.active { display: block; }

  /* 敬请期待面板 */
  .coming-soon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 10px;
    color: #555;
  }
  .coming-soon .big { font-size: 2.6rem; }
  .coming-soon h2   { font-size: 1rem; color: #000; font-weight: bold; }
  .coming-soon p    { font-size: 0.8rem; }

  /* ── 市场表格（经典ListView风格） ── */
  .market-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .market-table th {
    background: #c0c0c0;
    color: #000;
    padding: 5px 8px;
    text-align: left;
    position: sticky;
    top: 0;
    font-weight: bold;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #808080;
    border-bottom: 2px solid #808080;
  }
  .market-table td {
    padding: 5px 8px;
    border-bottom: 1px solid #c0c0c0;
    vertical-align: middle;
  }
  .market-table tr:nth-child(even) td { background: #efefef; }
  .market-table tr:hover td { background: #000080; color: #fff; }
  .market-table tr:hover .price-up   { color: #ff8080 !important; }
  .market-table tr:hover .price-down { color: #80ffff !important; }

  .price-cell  { font-weight: bold; color: #000; }
  .price-up    { color: #aa0000 !important; }
  .price-down  { color: #006400 !important; }
  .desc-cell   { color: #555; font-size: 0.75rem; max-width: 220px; }
  .holding-cell { color: #333; font-size: 0.78rem; }

  /* 操作区 */
  .trade-cell { display: flex; gap: 4px; align-items: center; }
  .qty-input {
    width: 60px;
    padding: 3px 5px;
    background: #fff;
    border: none;
    color: #000;
    font-size: 0.78rem;
    font-family: inherit;
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }
  .qty-input:focus { outline: 1px dotted #000; }
  .btn-buy, .btn-sell {
    padding: 3px 10px;
    border: none;
    font-size: 0.76rem;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    color: #000;
    background: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
  }
  .btn-buy:active, .btn-sell:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }
  .btn-buy  { color: #006400; }
  .btn-sell { color: #aa0000; }

  /* 连接状态点 */
  #conn-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #aa0000;
    margin-right: 4px;
    border: 1px solid #404040;
  }
  #conn-dot.on { background: #00aa00; }

  /* 市场异动弹窗（未使用，保留兼容） */
  #event-banner { display: none; }

  /* Win95 风格滚动条 */
  ::-webkit-scrollbar { width: 16px; height: 16px; }
  ::-webkit-scrollbar-track { background: #dfdfdf; }
  ::-webkit-scrollbar-thumb {
    background: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
  }
</style>
</head>
<body>

<!--
  BGM 说明：
  下面这个 <audio> 标签引用的是 static 文件夹里一个叫 bgm.mp3 的文件。
  出于版权原因，这里不会嵌入任何具体歌曲的音频数据——
  请把你自己合法拥有的音频文件重命名为 bgm.mp3，放进 static 文件夹即可生效。
-->
<audio id="bgm-audio" src="bgm.mp3" loop preload="none"></audio>

<!-- 登录界面 -->
<div id="login-screen">
  <div class="dialog">
    <div class="dialog-titlebar">
      <span>登录 - 公证所交易市场</span>
      <span class="x">✕</span>
    </div>
    <div class="dialog-body">
      <div class="icon">💾</div>
      <h1>公证所交易市场</h1>
      <p>请输入你的玩家名以继续</p>
      <input id="name-input" type="text" placeholder="玩家名" maxlength="16">
      <br>
      <button onclick="login()">确定</button>
    </div>
  </div>
</div>

<!-- 市场异动弹窗（保留兼容，当前不使用） -->
<div id="event-banner"></div>

<!-- 主界面 -->
<div id="app">
  <div id="titlebar">
    <span>📁 公证所交易市场.exe — v1.1</span>
    <span class="winbtns"><span>_</span><span>□</span><span>✕</span></span>
  </div>

  <div id="topbar">
    <span class="title">公证所交易市场</span>
    <span class="player-info">
      <span id="conn-dot"></span>
      <span id="player-name-label"></span>
      &nbsp;｜&nbsp;
      持有：<span class="cash" id="cash-label">—</span> 钞
    </span>
  </div>

  <div id="bgm-bar">
    <span class="bgm-icon">🎵</span>
    <button id="bgm-toggle" onclick="toggleBgm()">播放</button>
    <span id="bgm-track-name">背景音乐（需自行放入 bgm.mp3）</span>
    <input id="bgm-vol" type="range" min="0" max="1" step="0.05" value="0.5" onchange="setBgmVolume(this.value)">
  </div>

  <div id="notice">等待市场数据…</div>

  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('stones')">稀有金属</button>
    <button class="tab-btn"       onclick="switchTab('rabbits')">缝纫机兔</button>
    <button class="tab-btn"       onclick="switchTab('guns')">枪械配件</button>
    <button class="tab-btn"       onclick="switchTab('pets')">狩猎伙伴</button>
  </div>

  <div id="content">

    <!-- 稀有金属 -->
    <div class="tab-panel active" id="panel-stones">
      <table class="market-table">
        <thead>
          <tr>
            <th>材料</th>
            <th>当前价（钞/kg）</th>
            <th>持仓（kg）</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="stones-body"></tbody>
      </table>
    </div>

    <!-- 缝纫机兔 -->
    <div class="tab-panel" id="panel-rabbits">
      <table class="market-table">
        <thead>
          <tr>
            <th>兔子</th>
            <th>当前价（钞/只）</th>
            <th>持仓（只）</th>
            <th>描述</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="rabbits-body"></tbody>
      </table>
    </div>

    <!-- 枪械配件 -->
    <div class="tab-panel" id="panel-guns">
      <div class="coming-soon">
        <div class="big">🔧</div>
        <h2>枪械配件</h2>
        <p>敬请期待</p>
      </div>
    </div>

    <!-- 狩猎伙伴 -->
    <div class="tab-panel" id="panel-pets">
      <div class="coming-soon">
        <div class="big">🐾</div>
        <h2>狩猎伙伴</h2>
        <p>敬请期待</p>
      </div>
    </div>

  </div>
</div>

<script>
let ws = null;
let playerId   = "";
let playerData = { cash: 0, stones: {}, rabbits: {} };
let marketData  = { stones: {}, rabbits: {} };
let lastPrices  = { stones: {}, rabbits: {} };

const RABBIT_DESCS = {
  "雪怪兔":   "过于夸张的大兔脚。",
  "圣花兔":   "缝纫机头缠绕着荆棘的兔子。",
  "三角洲兔": "背上有A字红色标记的网格毛色兔子。",
  "海豹兔":   "有大胡子和纹身的兔子。",
  "\"水\"兔": "全身都像泡在低饱和像素中的兔子。",
  "素子兔":   "全身机械的兔子，能像祈臣一样隐身。",
  "火锅兔":   "毛色像火锅一般。",
  "烩面兔":   "毛色长短不均，像白汤中的面条。",
  "生煎兔":   "太过哈韩，有高丽旗纹身的兔子。",
  "主任兔":   "脾气暴躁的兔子，爱国之心毋庸置疑。",
  "花旗兔":   "不要对它说俄语。",
  "太子兔":   "全身被阴影覆盖，只能看到剪影的神秘兔子。",
  "千禧年":   "头部有个电子屏，显示hello world。",
  "法官兔":   "赵志先生。",
  "清华兔":   "穿着中山装的兔子。",
};

// ── 登录 ──
function login() {
  const name = document.getElementById("name-input").value.trim();
  if (!name) return;
  playerId = name;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("player-name-label").textContent = name;
  connectWS();
}
document.getElementById("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

// ── BGM 播放控制 ──
function toggleBgm() {
  const audio = document.getElementById("bgm-audio");
  const btn   = document.getElementById("bgm-toggle");
  if (audio.paused) {
    audio.play().catch(() => {
      document.getElementById("bgm-track-name").textContent = "未找到 bgm.mp3，请放入 static 文件夹";
    });
    btn.textContent = "暂停";
  } else {
    audio.pause();
    btn.textContent = "播放";
  }
}
function setBgmVolume(v) {
  document.getElementById("bgm-audio").volume = parseFloat(v);
}

// ── WebSocket ──
function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws/${encodeURIComponent(playerId)}`);
  ws.onopen  = () => document.getElementById("conn-dot").classList.add("on");
  ws.onclose = () => {
    document.getElementById("conn-dot").classList.remove("on");
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
}

function handleMsg(msg) {
  if (msg.type === "market") {
    lastPrices.stones  = { ...marketData.stones };
    lastPrices.rabbits = { ...marketData.rabbits };
    marketData.stones  = msg.stones;
    marketData.rabbits = msg.rabbits;
    renderMarket();
  } else if (msg.type === "player") {
    playerData = msg.data;
    renderPlayer();
  } else if (msg.type === "trade_ok") {
    playerData = msg.data;
    renderPlayer();
    showNotice(msg.msg, "ok");
  } else if (msg.type === "error") {
    showNotice(msg.msg, "err");
  }
}

// ── 通知栏 ──
let noticeTimer = null;
function showNotice(text, cls) {
  const el = document.getElementById("notice");
  el.textContent = text;
  el.className   = cls;
  clearTimeout(noticeTimer);
  noticeTimer = setTimeout(() => { el.textContent = ""; el.className = ""; }, 6000);
}

// ── 玩家信息 ──
function renderPlayer() {
  document.getElementById("cash-label").textContent =
    Math.floor(playerData.cash).toLocaleString();
  renderMarket();
}

// ── 标签页 ──
function switchTab(name) {
  const names = ["stones","rabbits","guns","pets"];
  document.querySelectorAll(".tab-btn").forEach((b, i) =>
    b.classList.toggle("active", names[i] === name));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
}

// ── 渲染市场 ──
function renderMarket() { renderStones(); renderRabbits(); }

function priceClass(item, cat) {
  const cur  = marketData[cat][item];
  const last = lastPrices[cat][item];
  if (!last || cur === last) return "";
  return cur > last ? "price-up" : "price-down";
}

// 渲染稀有金属表格。使用 DOM API 而非字符串拼接 HTML，
// 避免商品名中可能出现的引号等特殊字符破坏标签结构。
function renderStones() {
  const tbody = document.getElementById("stones-body");
  tbody.innerHTML = "";
  let idx = 0;
  for (const [name, price] of Object.entries(marketData.stones)) {
    const holding = (playerData.stones && playerData.stones[name]) || 0;
    const cls = priceClass(name, "stones");
    const inputId = `sq-${idx++}`;

    const tr = document.createElement("tr");

    const tdName = document.createElement("td");
    tdName.textContent = name;

    const tdPrice = document.createElement("td");
    tdPrice.className = `price-cell ${cls}`;
    tdPrice.textContent = Math.floor(price).toLocaleString();

    const tdHolding = document.createElement("td");
    tdHolding.className = "holding-cell";
    tdHolding.textContent = holding > 0 ? holding.toLocaleString() : "—";

    const tdTrade = document.createElement("td");
    const wrap = document.createElement("div");
    wrap.className = "trade-cell";

    const input = document.createElement("input");
    input.className = "qty-input";
    input.type = "number";
    input.min = "0.1";
    input.step = "0.1";
    input.value = "1";
    input.id = inputId;

    const btnBuy = document.createElement("button");
    btnBuy.className = "btn-buy";
    btnBuy.textContent = "买";
    btnBuy.addEventListener("click", () => trade("stones", name, "buy", inputId));

    const btnSell = document.createElement("button");
    btnSell.className = "btn-sell";
    btnSell.textContent = "卖";
    btnSell.addEventListener("click", () => trade("stones", name, "sell", inputId));

    wrap.append(input, btnBuy, btnSell);
    tdTrade.appendChild(wrap);
    tr.append(tdName, tdPrice, tdHolding, tdTrade);
    tbody.appendChild(tr);
  }
}

// 渲染缝纫机兔表格（同样使用 DOM API，修复"水"兔因名称带引号导致交易失效的问题）
function renderRabbits() {
  const tbody = document.getElementById("rabbits-body");
  tbody.innerHTML = "";
  let idx = 0;
  for (const [name, price] of Object.entries(marketData.rabbits)) {
    const holding = (playerData.rabbits && playerData.rabbits[name]) || 0;
    const cls = priceClass(name, "rabbits");
    const inputId = `rq-${idx++}`;

    const tr = document.createElement("tr");

    const tdName = document.createElement("td");
    tdName.textContent = name;

    const tdPrice = document.createElement("td");
    tdPrice.className = `price-cell ${cls}`;
    tdPrice.textContent = Math.floor(price).toLocaleString();

    const tdHolding = document.createElement("td");
    tdHolding.className = "holding-cell";
    tdHolding.textContent = holding > 0 ? holding : "—";

    const tdDesc = document.createElement("td");
    tdDesc.className = "desc-cell";
    tdDesc.textContent = RABBIT_DESCS[name] || "";

    const tdTrade = document.createElement("td");
    const wrap = document.createElement("div");
    wrap.className = "trade-cell";

    const input = document.createElement("input");
    input.className = "qty-input";
    input.type = "number";
    input.min = "1";
    input.step = "1";
    input.value = "1";
    input.id = inputId;

    const btnBuy = document.createElement("button");
    btnBuy.className = "btn-buy";
    btnBuy.textContent = "买";
    btnBuy.addEventListener("click", () => trade("rabbits", name, "buy", inputId));

    const btnSell = document.createElement("button");
    btnSell.className = "btn-sell";
    btnSell.textContent = "卖";
    btnSell.addEventListener("click", () => trade("rabbits", name, "sell", inputId));

    wrap.append(input, btnBuy, btnSell);
    tdTrade.appendChild(wrap);
    tr.append(tdName, tdPrice, tdHolding, tdDesc, tdTrade);
    tbody.appendChild(tr);
  }
}

// ── 发送交易 ──
function trade(category, item, action, inputId) {
  const input = document.getElementById(inputId);
  const qty   = parseFloat(input ? input.value : 1);
  if (!qty || qty <= 0) { showNotice("请输入有效数量", "err"); return; }
  ws.send(JSON.stringify({ action, category, item, qty }));
}
</script>
